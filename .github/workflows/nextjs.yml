  const icons = {
    linkedin: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.5 8.8H3.8V20h2.7zM5.2 7.3a1.6 1.6 0 1 0 0-3.2 1.6 1.6 0 0 0 0 3.2zM20.2 20v-6.1c0-3-1.6-4.4-3.8-4.4a3.2 3.2 0 0 0-2.9 1.6v-1.3h-2.7V20h2.7v-5.7c0-1.5.3-2.9 2.1-2.9s1.8 1.7 1.8 3V20z"/></svg>',
    mail: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m4 7 8 6 8-6"/></svg>',
    pin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 21s7-5.2 7-12a7 7 0 0 0-14 0c0 6.8 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>',
    search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>'
  };
  return icons[name] || '';
}
