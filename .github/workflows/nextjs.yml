    mic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>',
    edit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 20h4l10-10-4-4L4 16z"/><path d="m13 7 4 4"/></svg>',
    copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="8" y="8" width="11" height="11" rx="2"/><path d="M5 16H4a1 1 0 0 1-1-1V5a2 2 0 0 1 2-2h10a1 1 0 0 1 1 1v1"/></svg>',
    calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/></svg>',
    settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.4 1a7 7 0 0 0-1.7-1L14.5 3h-5l-.4 3.1a7 7 0 0 0-1.7 1l-2.4-1-2 3.4L5 11a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.4 3.1h5l.4-3.1a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.5a7 7 0 0 0 .1-1z"/></svg>',
    search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',
    linkedin: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.5 8.8H3.8V20h2.7zM5.2 7.3a1.6 1.6 0 1 0 0-3.2 1.6 1.6 0 0 0 0 3.2zM20.2 20v-6.1c0-3-1.6-4.4-3.8-4.4a3.2 3.2 0 0 0-2.9 1.6v-1.3h-2.7V20h2.7v-5.7c0-1.5.3-2.9 2.1-2.9s1.8 1.7 1.8 3V20z"/></svg>',
    mail: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m4 7 8 6 8-6"/></svg>',
    pin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 21s7-5.2 7-12a7 7 0 0 0-14 0c0 6.8 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>'
  };
  return icons[name] || icons.home;
}
function buildNav() {
  document.getElementById('overviewNav').innerHTML = OVERVIEW.map(([id, label, ic]) => navButton(id, label, ic)).join('');
  document.getElementById('layerNav').innerHTML = LAYERS.map(([id, label, ic]) => navButton(id, label, ic)).join('');
}
function navButton(id, label, ic) {
  return '<button class="nav-btn" data-page="' + id + '" onclick="go(\\'' + id + '\\')">' + icon(ic) + '<span>' + label + '</span></button>';
}
function go(id) {
  const next = '#' + id;
  if (location.hash === next) route();
  else location.hash = id;
}
function route() {
  const id = (location.hash || '#executive').replace('#', '');
  renderPage(DATA[id] ? id : 'executive');
}
window.addEventListener('hashchange', route);
function renderPage(id) {
  const page = DATA[id];
  document.querySelectorAll('.nav-btn').forEach((button) => button.classList.toggle('active', button.dataset.page === id));
  document.getElementById('search').value = '';
  if (id === 'executive') renderHome(page);
  else renderStandard(id, page);
  scrollToPageStart();
  requestAnimationFrame(scrollToPageStart);
  setTimeout(scrollToPageStart, 60);
}
function scrollToPageStart() {
  const isMobile = window.matchMedia('(max-width: 980px)').matches;
  const target = isMobile ? document.querySelector('.content') : document.body;
  const top = target ? target.getBoundingClientRect().top + window.pageYOffset : 0;
  window.scrollTo({ top: Math.max(0, top - 8), behavior: 'auto' });
}
function renderHome(page) {
  document.getElementById('main').innerHTML = \`
    <section class="hero-card">
      <img alt="Vaney Hariri speaking environment" src="\${HERO}">
      <div class="hero-copy">
        <h1>I help people build intentional cultures and become better leaders.</h1>
        <p>Leader. Coach. Entrepreneur.</p>
        <div class="hero-line"></div>
      </div>
    </section>
    <section class="profile-intro">
      <div class="eyebrow">\${page.eyebrow}</div>
      <h2>Vaney Hariri</h2>
      <p class="subtitle">Personal Brand OS Architecture</p>
      <p class="lede">\${page.lede}</p>
    </section>
    <section class="metrics">
      \${page.stats.map((stat, index) => \`
        <div class="metric searchable" data-text="\${esc((stat[0] + ' ' + stat[1]).toLowerCase())}">
          <div class="metric-icon">\${icon(['layers','network','calendar','resources'][index] || 'target')}</div>
          <b>\${stat[0]}</b>
          <span>\${stat[1]}</span>
        </div>\`).join('')}
    </section>
    <section>
      <div class="section-head">
        <div><h3>Executive Summary</h3><p>The strategic read on Vaney's ecosystem and activation path.</p></div>
        <button class="black-btn" onclick="go('architecture')">View Architecture</button>
      </div>
      <div class="grid">
        \${page.summary.map((item, index) => summaryCard(item, index)).join('')}
      </div>
    </section>
    \${activityHtml()}
    \${ctaHtml()}
  \`;
}
function summaryCard(item, index) {
  return \`
    <article class="card searchable" style="--accent:\${ACCENTS[index % ACCENTS.length]}" data-text="\${esc((item.k + ' ' + item.v + ' ' + item.d).toLowerCase())}">
      <div class="card-icon">\${icon(['target','layers','network','settings'][index] || 'briefcase')}</div>
      <div>
        <div class="card-num">\${String(index + 1).padStart(2, '0')}</div>
        <h4>\${item.k}</h4>
        <div class="card-tag">\${item.v}</div>
        <p>\${item.d}</p>
      </div>
    </article>
  \`;
}
function renderStandard(id, page) {
  document.getElementById('main').innerHTML = \`
    <div class="page-image"><strong>\${page.eyebrow}</strong></div>
    <section class="profile-intro">
      <div class="eyebrow">\${page.eyebrow}</div>
      <h2>\${page.title}</h2>
      <p class="lede">\${page.lede}</p>
    </section>
    <section>
      <div class="section-head">
        <div><h3>\${labelFor(id)}</h3><p>Open each card for implementation-level detail.</p></div>
        <button class="black-btn" onclick="toggleAll(true)">Expand All</button>
      </div>
      <div class="grid">
        \${page.cards.map((card, index) => cardHtml(id, card, index)).join('')}
      </div>
    </section>
    \${id === 'roadmap' ? activityHtml() : ''}
    \${ctaHtml()}
  \`;
}
function labelFor(id) {
  const found = LAYERS.find((item) => item[0] === id) || OVERVIEW.find((item) => item[0] === id);
  return found ? found[1] : 'Portal Layer';
}
function cardHtml(pageId, card, index) {
  return \`
    <article class="card searchable" style="--accent:\${ACCENTS[index % ACCENTS.length]}" data-text="\${esc((card.title + ' ' + card.tag + ' ' + card.body + ' ' + (card.deep || []).join(' ')).toLowerCase())}">
      <div class="card-icon">\${icon(LAYERS.find((item) => item[0] === pageId)?.[2] || 'briefcase')}</div>
      <div>
        <div class="card-num">\${String(index + 1).padStart(2, '0')}</div>
        <h4>\${card.title}</h4>
        <div class="card-tag">\${card.tag}</div>
        <p>\${card.body}</p>
        <div class="detail"><ul>\${(card.deep || []).map((item) => '<li>' + item + '</li>').join('')}</ul></div>
        <div class="card-actions">
          <button class="pill" onclick="openDrawer('\${pageId}', \${index})">Open details</button>
          <button class="pill" onclick="togglePreview(this)">Quick expand</button>
          \${pageId === 'samples' ? '<button class="pill" onclick="copyDeep(\\'' + pageId + '\\',' + index + ')">Copy</button>' : ''}
        </div>
      </div>
    </article>
  \`;
}
function activityHtml() {
  return \`
    <section class="activity">
      <div><b>Recent Activity</b><p>Key engagement and activation moments for the brand system.</p></div>
      <div><b>Culture & Leadership</b><p>Message architecture clarified for public authority.</p></div>
      <div><b>Content Engine</b><p>Transcript-to-content pipeline organized by pillar.</p></div>
      <div><b>Proof Loop</b><p>Review and testimonial capture mapped into the operating rhythm.</p></div>
    </section>
  \`;
}
function ctaHtml() {
  return \`
    <section class="cta">
      <div class="cta-logo"><div class="sl-mark">SL</div><span>StreamLab Ai</span></div>
      <p>Client-facing portal for Vaney Hariri's Personal Brand OS. Use the left navigation to move through every strategic layer.</p>
      <button class="pill" onclick="window.print()">Export PDF</button>
    </section>
  \`;
}
function togglePreview(button) {
  const detail = button.closest('.card').querySelector('.detail');
  detail.classList.toggle('open');
  button.textContent = detail.classList.contains('open') ? 'Collapse' : 'Quick expand';
}
function toggleAll(open) {
  document.querySelectorAll('.detail').forEach((detail) => detail.classList.toggle('open', open));
  document.querySelectorAll('.card-actions .pill:nth-child(2)').forEach((button) => button.textContent = open ? 'Collapse' : 'Quick expand');
}
function openDrawer(pageId, index) {
  const card = DATA[pageId].cards[index];
  document.getElementById('drawerTag').textContent = card.tag;
  document.getElementById('drawerTitle').textContent = card.title;
  const isCopy = pageId === 'samples';
  document.getElementById('drawerBody').innerHTML =
    '<div class="deep-item"><p>' + card.body + '</p></div>' +
    (isCopy
      ? '<div class="copybox"><button class="copybtn" onclick="copyText(this)">Copy</button>' + (card.deep || []).join('\\n\\n') + '</div>'
      : (card.deep || []).map((item) => '<div class="deep-item"><p>' + item + '</p></div>').join(''));
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); }
function copyText(button) {
  const clone = button.parentElement.cloneNode(true);
  clone.querySelector('button').remove();
  navigator.clipboard.writeText(clone.innerText.trim());
  button.textContent = 'Copied';
  setTimeout(() => button.textContent = 'Copy', 1200);
}
function copyDeep(pageId, index) {
  const card = DATA[pageId].cards[index];
  navigator.clipboard.writeText([card.title, card.body, ...(card.deep || [])].join('\\n\\n'));
}
function applySearch(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.searchable').forEach((item) => {
    item.style.display = !q || item.dataset.text.includes(q) ? '' : 'none';
  });
}
function esc(value) {
  return String(value).replace(/[&<>"']/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
}
buildNav();
if (sessionStorage.getItem('vh_portal_auth') === '1') {
  document.getElementById('gate').hidden = true;
}
route();
</script>
</body>
</html>`;

fs.writeFileSync(outPath, html);
console.log(outPath);

